server.port: 8080
solon.app.name: jimuqu-agent

solon.logging.appender.console.level: INFO
solon.logging.appender.console.pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{48} - %msg%n%ex"
solon.logging.appender.file.level: INFO
solon.logging.appender.file.pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{48} - %msg%n%ex"
solon.logging.appender.file.maxFileSize: 10 MB
solon.logging.appender.file.maxHistory: 7
solon.logging.logger.root.level: INFO

# 运行时目录配置
jimuqu.runtime.home: runtime
jimuqu.runtime.contextDir: runtime/context
jimuqu.runtime.skillsDir: runtime/skills
jimuqu.runtime.cacheDir: runtime/cache
jimuqu.runtime.stateDb: runtime/state.db
jimuqu.logging.dir: runtime/logs

# 默认大模型配置
jimuqu.llm.provider: openai-responses
jimuqu.llm.apiUrl: https://subapi.jimuqu.com/v1/responses
jimuqu.llm.model: gpt-5.4
jimuqu.llm.stream: false
jimuqu.llm.reasoningEffort: medium
jimuqu.llm.temperature: 0.2
jimuqu.llm.maxTokens: 4096
jimuqu.llm.contextWindowTokens: 128000

# 定时任务调度
jimuqu.scheduler.enabled: true
jimuqu.scheduler.tickSeconds: 60

# 上下文压缩
jimuqu.compression.enabled: true
jimuqu.compression.thresholdPercent: 0.5
jimuqu.compression.summaryModel:
jimuqu.compression.protectHeadMessages: 3
jimuqu.compression.tailRatio: 0.2

# 主回复后的自动学习
jimuqu.learning.enabled: true
jimuqu.learning.toolCallThreshold: 5

# 文件快照与回滚
jimuqu.rollback.enabled: true
jimuqu.rollback.maxCheckpointsPerSource: 20

# 聊天窗口显示
jimuqu.display.toolProgress: off
jimuqu.display.showReasoning: false
jimuqu.display.toolPreviewLength: 80
jimuqu.display.progressThrottleMs: 1500

# ReAct 推理控制
jimuqu.react.maxSteps: 12
jimuqu.react.retryMax: 3
jimuqu.react.retryDelayMs: 2000
jimuqu.react.delegateMaxSteps: 18
jimuqu.react.delegateRetryMax: 4
jimuqu.react.delegateRetryDelayMs: 2500
jimuqu.react.summarizationEnabled: true
jimuqu.react.summarizationMaxMessages: 40
jimuqu.react.summarizationMaxTokens: 32000

# 预定义人格
jimuqu.agent.personalities.helpful.description: 友好、通用的默认助手
jimuqu.agent.personalities.helpful.systemPrompt: 你是一个友好、可靠的中文技术助手，优先给出准确、可执行的答案。
jimuqu.agent.personalities.concise.description: 简洁直接，优先最短有效答案
jimuqu.agent.personalities.concise.systemPrompt: 你是一个非常简洁的中文技术助手，只输出解决问题所需的最少内容。
jimuqu.agent.personalities.technical.description: 偏工程化，强调原因、边界与验证
jimuqu.agent.personalities.technical.systemPrompt: 你是一个工程导向的中文技术助手，回答时强调约束、原因、风险和验证方式。
jimuqu.agent.personalities.technical.tone: 冷静、直接
jimuqu.agent.personalities.technical.style: 优先用清晰术语描述系统行为和实现边界

# 飞书渠道
jimuqu.channels.feishu.enabled: false
jimuqu.channels.feishu.allowedUsers:
jimuqu.channels.feishu.dmPolicy: open
jimuqu.channels.feishu.groupPolicy: allowlist
jimuqu.channels.feishu.groupAllowedUsers:
jimuqu.channels.feishu.allowAllUsers: false
jimuqu.channels.feishu.unauthorizedDmBehavior: pair
jimuqu.channels.feishu.botOpenId:
jimuqu.channels.feishu.botUserId:
jimuqu.channels.feishu.botName:
jimuqu.channels.feishu.websocketUrl:
jimuqu.channels.feishu.toolProgress: new

# 钉钉渠道，仅支持 stream mode 入站与官方机器人出站
# 建议优先使用环境变量注入敏感配置：
# JIMUQU_DINGTALK_ENABLED
# JIMUQU_DINGTALK_CLIENT_ID
# JIMUQU_DINGTALK_CLIENT_SECRET
# JIMUQU_DINGTALK_ROBOT_CODE
jimuqu.channels.dingtalk.enabled: false
jimuqu.channels.dingtalk.allowedUsers:
jimuqu.channels.dingtalk.dmPolicy: open
jimuqu.channels.dingtalk.groupPolicy: open
jimuqu.channels.dingtalk.groupAllowedUsers:
jimuqu.channels.dingtalk.allowAllUsers: false
jimuqu.channels.dingtalk.unauthorizedDmBehavior: pair
jimuqu.channels.dingtalk.robotCode:
jimuqu.channels.dingtalk.coolAppCode:
jimuqu.channels.dingtalk.streamUrl:
jimuqu.channels.dingtalk.toolProgress: new
jimuqu.channels.dingtalk.progressCardTemplateId:

# 企微渠道
jimuqu.channels.wecom.enabled: false
jimuqu.channels.wecom.allowedUsers:
jimuqu.channels.wecom.dmPolicy: open
jimuqu.channels.wecom.groupPolicy: open
jimuqu.channels.wecom.groupAllowedUsers:
jimuqu.channels.wecom.allowAllUsers: false
jimuqu.channels.wecom.unauthorizedDmBehavior: pair
jimuqu.channels.wecom.websocketUrl:
jimuqu.channels.wecom.toolProgress: off

# 微信渠道
jimuqu.channels.weixin.enabled: false
jimuqu.channels.weixin.allowedUsers:
jimuqu.channels.weixin.dmPolicy: open
jimuqu.channels.weixin.groupPolicy: disabled
jimuqu.channels.weixin.groupAllowedUsers:
jimuqu.channels.weixin.allowAllUsers: false
jimuqu.channels.weixin.unauthorizedDmBehavior: pair
jimuqu.channels.weixin.accountId:
jimuqu.channels.weixin.baseUrl: https://ilinkai.weixin.qq.com
jimuqu.channels.weixin.cdnBaseUrl: https://novac2c.cdn.weixin.qq.com/c2c
jimuqu.channels.weixin.longPollUrl:
jimuqu.channels.weixin.token:
jimuqu.channels.weixin.splitMultilineMessages: false
jimuqu.channels.weixin.sendChunkDelaySeconds: 0.35
jimuqu.channels.weixin.sendChunkRetries: 2
jimuqu.channels.weixin.sendChunkRetryDelaySeconds: 1.0
jimuqu.channels.weixin.toolProgress: off

# 全局网关授权兜底配置
jimuqu.gateway.allowedUsers:
jimuqu.gateway.allowAllUsers: false
